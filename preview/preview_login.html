<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bienestar Universitario UCC</title>
    <link rel="stylesheet" href="../static/styles.css">
    <style>
      /* For local preview: use relative path to background image */
      body {
        background-image: url('../static/background.jpg');
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
      }
    </style>
  </head>
  <body class="login-page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">UCC</div>
        <div>
          <h1>Bienestar Universitario UCC</h1>
          <small>Control de asistencia académica</small>
        </div>
      </div>
      <div class="actions">
        
      </div>
    </header>
    <main class="container login-wrap">
      
        
      

      
  <section class="login-card">
    <div class="login-logos">
      <div class="logo-pill">CAMPUS virtual</div>
      <div class="logo-ucc">UCC</div>
    </div>

    <h2>Login</h2>
    <p>Bienestar Universitario UCC</p>

    <form method="post">
      <div class="field">
        <label for="correo">Usuario</label>
        <input id="correo" type="email" name="correo" placeholder="usuario@ucc.edu.co" required>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" name="password" placeholder="••••••••" required>
      </div>

      <button class="btn" type="submit">Login</button>
      <a class="login-help" href="#">¿Olvidó su contraseña?</a>
    </form>
  </section>

    </main>
  </body>
</html>
