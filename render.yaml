services:
  - type: web
    name: horas-bienestar
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: REQUIRED_WELLBEING_HOURS
        value: "40"
