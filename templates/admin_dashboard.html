{% extends 'base.html' %}
{% block content %}
<div class="dashboard-header">
  <h1 class="dashboard-title">Panel de Administración</h1>
  <p class="dashboard-subtitle">Gestiona usuarios, actividades y reportes del sistema</p>
</div>

<!-- Acciones rápidas -->
<div class="grid-4" style="margin-bottom: var(--spacing-2xl);">
  <a href="{{ url_for('register_student') }}" class="action-card">
    <div class="action-card-icon">👤</div>
    <div class="action-card-title">Registrar<br/>estudiante</div>
  </a>
  
  <a href="{{ url_for('register_docente') }}" class="action-card">
    <div class="action-card-icon">👨‍🏫</div>
    <div class="action-card-title">Crear<br/>docente</div>
  </a>
  
  <a href="{{ url_for('admin_reports') }}" class="action-card">
    <div class="action-card-icon">📊</div>
    <div class="action-card-title">Ver<br/>reportes</div>
  </a>
  
  <a href="{{ url_for('export_students') }}" class="action-card">
    <div class="action-card-icon">📥</div>
    <div class="action-card-title">Exportar<br/>Excel</div>
  </a>
  
  <a href="{{ url_for('import_students') }}" class="action-card">
    <div class="action-card-icon">📤</div>
    <div class="action-card-title">Importar<br/>Excel</div>
  </a>
  
  <a href="{{ url_for('admin_audit_logs') }}" class="action-card">
    <div class="action-card-icon">🔒</div>
    <div class="action-card-title">Auditoría</div>
  </a>

  <a href="{{ url_for('view_students') }}" class="action-card">
    <div class="action-card-icon">👥</div>
    <div class="action-card-title">Estudiantes<br/>registrados</div>
  </a>

  <a href="{{ url_for('view_docentes') }}" class="action-card">
    <div class="action-card-icon">🎓</div>
    <div class="action-card-title">Docentes<br/>registrados</div>
  </a>
</div>
{% endblock %}
