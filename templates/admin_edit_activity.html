{% extends 'base.html' %}
{% block content %}
  <h2>Editar actividad</h2>
  <form method="post" id="edit-activity-form">
    <label>Nombre: <input name="nombre" id="act-nombre" required value="{{ actividad.nombre }}"></label><br>
    <label>Fecha (opcional): <input name="fecha" type="date" value="{{ actividad.fecha.strftime('%Y-%m-%d') if actividad.fecha else '' }}"></label><br>
    <label>Hora (opcional): <input name="hora" type="time" value="{{ actividad.fecha.strftime('%H:%M') if actividad.fecha else '' }}"></label><br>
    <label>Horas: <input name="horas" id="act-horas" type="number" step="0.5" min="0" value="{{ actividad.horas or 0 }}"></label><br>
    <button type="submit">Guardar cambios</button>
    <a class="btn" href="{{ url_for('docente_dashboard') if current_user.rol == 'docente' else url_for('admin_dashboard') }}">Cancelar</a>
  </form>

  <script>
    (function(){
      const form = document.getElementById('edit-activity-form');
      form.addEventListener('submit', function(e){
        const nombre = document.getElementById('act-nombre').value.trim();
        const horas = document.getElementById('act-horas').value;
        if (!nombre){ e.preventDefault(); alert('El nombre de la actividad es obligatorio'); return; }
        if (horas && Number(horas) < 0){ e.preventDefault(); alert('Horas debe ser un número positivo'); return; }
      });
    })();
  </script>
{% endblock %}
