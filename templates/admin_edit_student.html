{% extends 'base.html' %}
{% block content %}
<button onclick="history.back()" class="btn btn-secondary" style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem;">
  <span>\u2190</span> Atrás
</button>
<div class="dashboard-header">
  <h1 class="dashboard-title">Editar Información del Estudiante</h1>
  <p class="dashboard-subtitle">Actualiza los datos de {{ student.primer_nombre }} {{ student.primer_apellido }}</p>
</div>

<div class="card" style="max-width: 800px;">
  <form method="post" id="edit-form" class="form-content">
    <!-- Documento -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
      <div class="form-group">
        <label for="tipo_documento" class="form-label">Tipo de documento *</label>
        <select name="tipo_documento" id="tipo_documento" class="form-select" required>
          <option value="" disabled {% if not student.tipo_documento %}selected{% endif %}>Seleccione...</option>
          <option value="cc" {% if student.tipo_documento == 'cc' %}selected{% endif %}>Cédula de Ciudadanía</option>
          <option value="ti" {% if student.tipo_documento == 'ti' %}selected{% endif %}>Tarjeta de Identidad</option>
          <option value="cex" {% if student.tipo_documento == 'cex' %}selected{% endif %}>Cédula de Extranjería</option>
        </select>
      </div>

      <div class="form-group">
        <label for="numero_documento" class="form-label">Número de documento *</label>
        <input type="text" id="numero_documento" name="numero_documento" class="form-input" required value="{{ student.numero_documento or '' }}">
      </div>
    </div>

    <!-- Nombres y Apellidos -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
      <div class="form-group">
        <label for="primer_nombre" class="form-label">Primer nombre *</label>
        <input type="text" id="primer_nombre" name="primer_nombre" class="form-input" required value="{{ student.primer_nombre or '' }}">
      </div>

      <div class="form-group">
        <label for="segundo_nombre" class="form-label">Segundo nombre</label>
        <input type="text" id="segundo_nombre" name="segundo_nombre" class="form-input" value="{{ student.segundo_nombre or '' }}">
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
      <div class="form-group">
        <label for="primer_apellido" class="form-label">Primer apellido *</label>
        <input type="text" id="primer_apellido" name="primer_apellido" class="form-input" required value="{{ student.primer_apellido or '' }}">
      </div>

      <div class="form-group">
        <label for="segundo_apellido" class="form-label">Segundo apellido</label>
        <input type="text" id="segundo_apellido" name="segundo_apellido" class="form-input" value="{{ student.segundo_apellido or '' }}">
      </div>
    </div>

    <!-- Correos -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
      <div class="form-group">
        <label for="correo_institucional" class="form-label">Correo institucional *</label>
        <input type="email" id="correo_institucional" name="correo_institucional" class="form-input" required pattern="[A-Za-z0-9._%+-]+@campusucc\.edu\.co" value="{{ student.correo_institucional or '' }}">
        <small class="form-hint">Debe terminar en @campusucc.edu.co</small>
      </div>

      <div class="form-group">
        <label for="correo_personal" class="form-label">Correo personal</label>
        <input type="email" id="correo_personal" name="correo_personal" class="form-input" value="{{ student.correo_personal or '' }}">
      </div>
    </div>

    <!-- Contacto -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg);">
      <div class="form-group">
        <label for="celular" class="form-label">Celular</label>
        <input type="tel" id="celular" name="celular" class="form-input" value="{{ student.celular or '' }}" maxlength="10" pattern="[0-9]{10}">
        <small class="form-hint">10 dígitos sin espacios</small>
      </div>

      <div class="form-group">
        <label for="programa" class="form-label">Programa académico</label>
        <input type="text" id="programa" name="programa" class="form-input" value="{{ student.programa or '' }}">
      </div>
    </div>

    <!-- Dirección -->
    <div class="form-group">
      <label for="direccion" class="form-label">Dirección</label>
      <input type="text" id="direccion" name="direccion" class="form-input" value="{{ student.direccion or '' }}">
    </div>

    <!-- Botones -->
    <div style="display: flex; gap: var(--spacing-md); justify-content: flex-end;">
      <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </div>
  </form>
</div>

<script>
  (function(){
    const form = document.getElementById('edit-form');
    form.addEventListener('submit', function(e){
      const correo = document.getElementById('correo_institucional').value;
      const celular = document.getElementById('celular').value;
      
      if (correo && !correo.toLowerCase().endsWith('@campusucc.edu.co')){
        e.preventDefault();
        alert('El correo institucional debe terminar en @campusucc.edu.co');
        return;
      }
      
      if (celular && celular.length !== 10){
        e.preventDefault();
        alert('El celular debe tener exactamente 10 dígitos');
        return;
      }
      
      if (celular && !/^\d{10}$/.test(celular)){
        e.preventDefault();
        alert('El celular solo debe contener números');
        return;
      }
    });
  })();
</script>

<style>
  .form-content {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-lg);
  }
</style>
{% endblock %}
