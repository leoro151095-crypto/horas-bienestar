{% extends 'base.html' %}
{% block content %}
<div class="dashboard-header">
  <h1 class="dashboard-title">Cambiar Contraseña</h1>
  <p class="dashboard-subtitle">Por seguridad, actualiza tu contraseña para continuar</p>
</div>

<div class="card" style="max-width: 600px;">
  <form method="post" id="password-form" class="form-content">
    <div class="alert alert-warning">
      <strong>Importante:</strong> Esta es tu primera vez accediendo al sistema. Por seguridad, debes cambiar tu contraseña temporal.
    </div>

    <div class="form-group">
      <label for="current_password" class="form-label">Contraseña actual *</label>
      <input type="password" id="current_password" name="current_password" class="form-input" required placeholder="Ingresa tu contraseña temporal">
    </div>

    <div class="form-group">
      <label for="new_password" class="form-label">Nueva contraseña *</label>
      <input type="password" id="new_password" name="new_password" class="form-input" required minlength="6" placeholder="Mínimo 6 caracteres">
      <small class="form-hint">Debe tener al menos 6 caracteres</small>
    </div>

    <div class="form-group">
      <label for="confirm_password" class="form-label">Confirmar nueva contraseña *</label>
      <input type="password" id="confirm_password" name="confirm_password" class="form-input" required minlength="6" placeholder="Repite tu nueva contraseña">
    </div>

    <!-- Botones -->
    <div style="display: flex; gap: var(--spacing-md); justify-content: flex-end;">
      <button type="submit" class="btn btn-primary btn-block">Actualizar contraseña</button>
    </div>
  </form>
</div>

<script>
  (function(){
    const form = document.getElementById('password-form');
    form.addEventListener('submit', function(e){
      const newPass = document.getElementById('new_password').value;
      const confirmPass = document.getElementById('confirm_password').value;
      
      if (newPass.length < 6){
        e.preventDefault();
        alert('La nueva contraseña debe tener al menos 6 caracteres');
        return;
      }
      
      if (newPass !== confirmPass){
        e.preventDefault();
        alert('Las contraseñas no coinciden');
        return;
      }
    });
  })();
</script>

<style>
  .form-content {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-lg);
  }
</style>
{% endblock %}
