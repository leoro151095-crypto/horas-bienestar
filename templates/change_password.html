{% extends 'base.html' %}
{% block content %}
  <h2>Cambiar contraseña</h2>
  <p>Por seguridad, debes cambiar tu contraseña para continuar.</p>
  <form method="post">
    <label>Contraseña actual: <input name="current_password" type="password" required></label><br>
    <label>Nueva contraseña: <input name="new_password" type="password" required minlength="6"></label><br>
    <label>Confirmar nueva contraseña: <input name="confirm_password" type="password" required minlength="6"></label><br>
    <button type="submit">Guardar contraseña</button>
  </form>
{% endblock %}
